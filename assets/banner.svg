<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" rx="15" ry="15" />
  <text x="50%" y="45%" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" fill="#58a6ff" text-anchor="middle" filter="url(#shadow)">
    GitHub Tabs CLI
  </text>
  <text x="50%" y="70%" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" fill="#8b949e" text-anchor="middle">
    Enable repository features with one command 🚀
  </text>
  <rect x="50" y="140" width="700" height="2" fill="#30363d" />
  <circle cx="50" cy="141" r="4" fill="#238636" />
  <circle cx="750" cy="141" r="4" fill="#238636" />
</svg>
